<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo-icon-light.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d1b2a" />
    <meta
      name="description"
      content="EdgeToo Solutions — Industrial Automation, PLC, HMI, Vision, Safety &amp; IT Services"
    />
    <meta name="keywords" content="Automation, PLC, HMI, Vision Systems, Safety, IT Services, Industrial Solutions, EdgeToo" />
    <meta property="og:title" content="EdgeToo Solutions" />
    <meta property="og:description" content="Smart Industrial Solutions for the Connected World" />
    <meta property="og:image" content="%PUBLIC_URL%/logo-icon-dark.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo-icon-light.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>EdgeToo Solutions</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!--
      IMPORTANT: This hidden form tells Netlify about our enquiry form at build time.
      It MUST be in <body> for Netlify to detect it. Do NOT remove it.
    -->
    <form name="enquiry" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <select name="product">
        <option value="Automation">Automation</option>
        <option value="PLC">PLC</option>
        <option value="HMI">HMI</option>
        <option value="Vision">Vision</option>
        <option value="Safety">Safety</option>
        <option value="IT Services">IT Services</option>
        <option value="General">General Enquiry</option>
      </select>
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
